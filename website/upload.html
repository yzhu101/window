<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传花格 - 水泥花格地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f1e6; min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; color: #5e3643; margin-bottom: 20px; }
    .form-group { background: white; padding: 20px; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(94,54,67,0.05); border: 1px solid rgba(94,54,67,0.1); }
    label { display: block; margin-bottom: 8px; color: #5e3643; font-weight: 600; }
    .required::after { content: ' *'; color: #e74c3c; }
    .rarity-group {
      display: flex;
      gap: 10px;
    }
    .rarity-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      background: white;
      color: #666;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .rarity-btn.active {
      background: #5e3643;
      color: white;
      border-color: #5e3643;
      font-weight: bold;
    }
    input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; color: #333; }
    input[type="text"]:focus, textarea:focus { border-color: #5e3643; outline: none; box-shadow: 0 0 0 2px rgba(94,54,67,0.1); }
    textarea { min-height: 100px; resize: vertical; }
    #map { width: 100%; height: 280px; border-radius: 8px; margin-top: 8px; border: 2px solid #ddd; }
    .search-box { display: flex; gap: 8px; margin-bottom: 10px; }
    .search-box input { flex: 1; }
    .search-box button { padding: 12px 20px; background: #5e3643; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .search-box button:disabled { background: #ccc; }
    .locate-btn { background: #6b3c4a; }
    .location-info { background: #f5f1e6; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 14px; color: #666; border: 1px solid rgba(94,54,67,0.1); }
    .location-info span { color: #5e3643; font-weight: 600; }
    .upload-area { border: 2px dashed #5e3643; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; background: rgba(94,54,67,0.02); transition: all 0.2s; }
    .upload-area:hover { background: rgba(94,54,67,0.05); }
    .upload-area input { display: none; }
    .preview img { max-width: 100%; border-radius: 8px; margin-top: 16px; }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(145deg, #653a48, #552f3a); /* 微妙的立体渐变 */
      color: #fff;
      border: none;
      border-radius: 12px; /* 圆角稍微加大一点，更圆润 */
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 4px; /* 增加字间距，更有呼吸感 */
      text-indent: 4px; /* 修正字间距带来的视觉偏差 */
      cursor: pointer;
      margin-top: 24px;
      
      /* 复合阴影：一层深色投影 + 一层微弱的反射光 */
      box-shadow: 
        0 6px 16px rgba(94, 54, 67, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    /* 悬停状态：上浮，阴影扩散 */
    .submit-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(145deg, #6e404f, #5e3441);
      box-shadow: 
        0 8px 20px rgba(94, 54, 67, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    /* 点击状态：下沉，内阴影显现 */
    .submit-btn:active {
      transform: translateY(1px);
      background: #552f3a;
      box-shadow: 
        0 2px 8px rgba(94, 54, 67, 0.2),
        inset 0 2px 4px rgba(0, 0, 0, 0.2); /* 内部凹陷感 */
    }

    .submit-btn:disabled {
      background: #ccc;
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }

    .submit-btn img {
      height: 32px; /* 图标放大 */
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.95; /* 稍微提高不透明度 */
    }
    
    /* 添加一个光扫过的动画效果 */
    .submit-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: 0.5s;
    }
    .submit-btn:hover::after {
      left: 100%;
    }
    .back-link { display: inline-block; margin-bottom: 20px; color: #5e3643; text-decoration: none; font-weight: 500; }
    .back-link:hover { text-decoration: underline; }
    .success-msg { background: #f5f1e6; color: #5e3643; padding: 30px; border-radius: 12px; text-align: center; border: 1px solid rgba(94,54,67,0.1); }
    .success-msg h2 { color: #5e3643; margin-bottom: 10px; }
    .tips { background: rgba(94,54,67,0.05); padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; color: #5e3643; border: 1px solid rgba(94,54,67,0.1); }
    .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icp-badge {
      position: fixed;
      right: 16px;
      bottom: 8px;
      z-index: 1000;
      font-size: 8px;
      color: #5e3643;
      text-align: right;
    }
    .icp-badge a {
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回地图</a>
    <h1>📷 上传水泥花格</h1>
    <div class="tips">💡 你可以记录不完美的、破损的花格，或是被创造性使用的花格，也可以一并记录一下花格周边的环境。</div>
    
    <form id="uploadForm">
      <div class="form-group">
        <label class="required">照片</label>
        <div class="upload-area" onclick="document.getElementById('photo').click()">
          <input type="file" id="photo" accept="image/*" required onchange="previewImage(this)">
          <p style="font-size: 48px; margin-bottom: 10px;">📤</p>
          <p>点击选择照片</p>
          <p style="color: #999; font-size: 14px; margin-top: 8px;">支持 JPG、PNG 格式</p>
        </div>
        <div class="preview" id="preview"></div>
      </div>
      
      <div class="form-group">
        <label class="required">标题</label>
        <input type="text" id="title" placeholder="给这个花格起个名字" required>
      </div>
      
      <div class="form-group">
        <label>描述</label>
        <textarea id="description" placeholder="描述一下这个花格的特点..."></textarea>
      </div>

      <div class="form-group">
        <label>用户ID / 社交媒体账号（可选）</label>
        <input type="text" id="userId" placeholder="留下您的ID或社交账号，方便我们联系您">
      </div>

      <div class="form-group">
        <label>稀有程度</label>
        <div class="rarity-group">
          <button type="button" class="rarity-btn active" data-value="普通">普通</button>
          <button type="button" class="rarity-btn" data-value="稀有">稀有</button>
          <button type="button" class="rarity-btn" data-value="非常稀有">非常稀有</button>
        </div>
        <input type="hidden" id="rarity" value="普通">
      </div>
      
      <div class="form-group">
        <label class="required">位置</label>
        <div class="tips">💡 提示：输入地址搜索或在地图上点击位置，也可以选择定位当前位置</div>
        
        <div class="search-box">
          <input type="text" id="addressInput" placeholder="输入地址，如：北京市朝阳区三里屯">
          <button type="button" onclick="searchAddress()" id="searchBtn" aria-label="搜索">🔍</button>
          <button type="button" onclick="useCurrentLocation()" id="locateBtn" class="locate-btn" aria-label="使用当前位置">📍</button>
        </div>
        
        <div id="map"></div>
        
        <div class="location-info">
          经纬度：<span id="latDisplay">未选择</span>, <span id="lngDisplay">未选择</span><br>
          地址：<span id="addressDisplay">未选择</span>
        </div>
        
        <input type="hidden" id="lat" required>
        <input type="hidden" id="lng" required>
        <input type="hidden" id="address">
      </div>
      
      <button type="submit" class="submit-btn" id="submitBtn">
        <img src="/assets/img/window-flower-icon-small.png" alt="icon">
        提交
      </button>
    </form>
  </div>

  <script>
    const TENCENT_KEY = '3DABZ-G6ECJ-2HZFC-XHP5I-KESCS-ILBMT';
    const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    const API_BASE = window.API_BASE || (isLocal ? 'http://localhost:3000' : '');
    
    const map = L.map('map').setView([35.8617, 104.1954], 5);
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
      subdomains: ['1', '2', '3', '4'],
      maxZoom: 18,
      attribution: '© 高德地图'
    }).addTo(map);
    
    let marker = null;
    let currentLat = null;
    let currentLng = null;
    
    map.on('click', function(e) {
      setLocation(e.latlng.lat, e.latlng.lng, null);
    });
    
    function setLocation(lat, lng, address) {
      currentLat = lat;
      currentLng = lng;
      document.getElementById('lat').value = lat;
      document.getElementById('lng').value = lng;
      document.getElementById('latDisplay').textContent = lat.toFixed(6);
      document.getElementById('lngDisplay').textContent = lng.toFixed(6);
      
      if (marker) map.removeLayer(marker);
      marker = L.marker([lat, lng]).addTo(map);
      
      if (address) {
        document.getElementById('address').value = address;
        document.getElementById('addressDisplay').textContent = address;
      } else {
        reverseGeocode(lat, lng);
      }
    }
    
    function searchAddress() {
      const query = document.getElementById('addressInput').value.trim();
      if (!query) { alert('请输入地址'); return; }
      
      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';
      
      const callbackName = 'tencentGeocode_' + Date.now();
      window[callbackName] = function(data) {
        delete window[callbackName];
        document.head.removeChild(script);
        
        btn.disabled = false;
        btn.innerHTML = '🔍';
        
        console.log('腾讯地图返回:', data);
        
        if (data.status === 0 && data.result && data.result.location) {
          const { lat, lng } = data.result.location;
          const address = data.result.formatted_addresses?.recommend || data.result.address || query;
          setLocation(lat, lng, address);
          map.setView([lat, lng], 15);
        } else if (data.status === 311) {
          alert('每日调用额度已用完，请明天再试');
        } else if (data.status === 308) {
          alert('请求过于频繁，请稍后再试');
        } else {
          alert('未找到该地址：' + (data.message || '请尝试其他关键词'));
        }
      };
      
      const script = document.createElement('script');
      script.src = `https://apis.map.qq.com/ws/geocoder/v1/?address=${encodeURIComponent(query)}&key=${TENCENT_KEY}&output=jsonp&callback=${callbackName}`;
      
      script.onerror = function() {
        delete window[callbackName];
        document.head.removeChild(script);
        btn.disabled = false;
        btn.innerHTML = '🔍';
        alert('网络请求失败，请检查网络连接');
      };
      
      setTimeout(function() {
        if (window[callbackName]) {
          delete window[callbackName];
          if (script.parentNode) document.head.removeChild(script);
          btn.disabled = false;
          btn.innerHTML = '🔍';
          alert('请求超时，请重试');
        }
      }, 10000);
      
      document.head.appendChild(script);
    }
    
    function reverseGeocode(lat, lng) {
      const callbackName = 'tencentRegeocode_' + Date.now();
      window[callbackName] = function(data) {
        delete window[callbackName];
        document.head.removeChild(script);
        
        if (data.status === 0 && data.result) {
          const address = data.result.formatted_addresses?.recommend || data.result.address;
          document.getElementById('address').value = address;
          document.getElementById('addressDisplay').textContent = address;
        } else {
          document.getElementById('addressDisplay').textContent = '未知地址';
        }
      };
      
      const script = document.createElement('script');
      script.src = `https://apis.map.qq.com/ws/geocoder/v1/?location=${lat},${lng}&key=${TENCENT_KEY}&output=jsonp&callback=${callbackName}`;
      
      script.onerror = function() {
        delete window[callbackName];
        if (script.parentNode) document.head.removeChild(script);
        document.getElementById('addressDisplay').textContent = '获取地址失败';
      };
      
      setTimeout(function() {
        if (window[callbackName]) {
          delete window[callbackName];
          if (script.parentNode) document.head.removeChild(script);
        }
      }, 10000);
      
      document.head.appendChild(script);
    }
    
    function useCurrentLocation() {
      const btn = document.getElementById('locateBtn');
      if (!navigator.geolocation) { alert('当前浏览器不支持定位'); return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';
      navigator.geolocation.getCurrentPosition(function(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        setLocation(lat, lng, null);
        map.setView([lat, lng], 15);
        btn.disabled = false;
        btn.innerHTML = '📍';
      }, function(err) {
        let msg = '定位失败，请检查权限设置';
        if (err && err.code === 1) msg = '定位被拒绝，请在浏览器设置中允许位置权限';
        if (err && err.code === 2) msg = '定位不可用，请稍后重试';
        if (err && err.code === 3) msg = '定位超时，请重试';
        alert(msg);
        btn.disabled = false;
        btn.innerHTML = '📍';
      }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    }
    
    // 稀有度按钮交互
    document.querySelectorAll('.rarity-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        // 移除所有按钮的 active 类
        document.querySelectorAll('.rarity-btn').forEach(b => b.classList.remove('active'));
        // 给当前点击的按钮添加 active 类
        this.classList.add('active');
        // 更新隐藏域的值
        document.getElementById('rarity').value = this.dataset.value;
      });
    });

    function previewImage(input) {
      const preview = document.getElementById('preview');
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.innerHTML = '<img src="' + e.target.result + '" alt="预览">';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }
    
    document.getElementById('uploadForm').onsubmit = async function(e) {
      e.preventDefault();
      if (!currentLat || !currentLng) { alert('请选择位置'); return; }
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span>上传中...';
      
      try {
        const formData = new FormData();
        formData.append('images', document.getElementById('photo').files[0]);
        formData.append('title', document.getElementById('title').value);
        formData.append('description', document.getElementById('description').value);
        formData.append('userId', document.getElementById('userId').value);
        formData.append('rarity', document.getElementById('rarity').value);
        formData.append('lat', currentLat);
        formData.append('lng', currentLng);
        formData.append('address', document.getElementById('address').value || '');
        
        const response = await fetch(`${API_BASE}/api/works`, { method: 'POST', body: formData });
        
        if (response.ok) {
          document.querySelector('.container').innerHTML = '<div class="success-msg"><h2>✅ 上传成功！</h2><p>感谢您的分享，您的花格已提交审核。</p><p style="margin-top: 15px;"><a href="/" style="color: #5e3643; font-weight: bold; margin-right: 20px;">返回地图</a><a href="/upload.html" style="color: #5e3643; font-weight: bold;">继续上传</a></p></div>';
        } else {
          const error = await response.json();
          alert('上传失败 (' + response.status + '): ' + (error.error || '请重试'));
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<img src="/assets/img/window-flower-icon-small.png" alt="icon"> 提交';
        }
      } catch (error) {
        console.error('上传出错:', error);
        alert('上传请求失败，请检查网络连接或服务器状态 (' + error.message + ')');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<img src="/assets/img/window-flower-icon-small.png" alt="icon"> 提交';
      }
    };
    
    document.getElementById('addressInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); searchAddress(); }
    });
  </script>
  <div class="icp-badge"><a href="https://beian.miit.gov.cn" target="_blank" rel="noopener noreferrer">粤ICP备2026024114号-1</a></div>
</body>
</html>
