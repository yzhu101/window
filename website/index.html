<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水泥花格地图 - 记录城市记忆</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- 引入 MarkerCluster 插件实现聚合与散开特效 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { width: 100vw; height: 100vh; }
    .glass-bar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 6px 6px 16px; /* 右侧padding减小，因为按钮自带padding */
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-radius: 100px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      max-width: 90vw;
    }
    .glass-bar:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      transform: translateX(-50%) translateY(-2px) scale(1.02);
      background: rgba(255, 255, 255, 0.85);
    }
    .site-logo {
      height: 36px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      opacity: 0.9;
    }
    .site-logo img {
      height: 100%;
      width: auto;
      display: block;
    }
    /* 分隔线样式优化 */
    .divider {
      width: 1px;
      height: 16px;
      background: rgba(0,0,0,0.08);
      margin: 0 4px;
    }
    .upload-btn {
      background: #5e3643; /* 改为深色背景，更像胶囊按钮 */
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 100px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(94, 54, 67, 0.3);
      flex-shrink: 0;
    }
    .upload-btn:hover {
      background: #6e404f;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(94, 54, 67, 0.4);
    }
    .upload-btn-upload {
      background: #fff;
      color: #5e3643;
      border: 1px solid #eee;
      box-shadow: none;
    }
    .upload-btn-upload:hover {
      background: #fff;
      box-shadow: none;
    }
    .upload-btn span {
      display: inline-block; /* 确保文字不换行 */
    }
    /* 统计数字样式 */
    .stats-badge {
      font-size: 12px;
      color: #666;
      font-weight: 500;
      margin-right: 4px;
      display: inline-block;
    }
    @media (min-width: 600px) {
      .stats-badge {
        display: block;
      }
    }
    @media (max-width: 600px) {
      .stats-badge { font-size: 11px; }
      .glass-bar { padding: 4px 8px 4px 12px; gap: 8px; }
      .upload-btn { padding: 6px 10px; font-size: 12px; }
      .pokedex-btn span:last-child { display: none; }
      .upload-btn-upload span:last-child { display: none; }
    }
    .social-links {
      position: fixed;
      right: 16px;
      bottom: 80px; /* 在右下角Logo上方，Logo高度约35px，加上间距 */
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .social-btn {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.6);
      transition: all 0.2s;
      color: #454545;
      text-decoration: none;
      font-size: 18px;
    }
    .social-btn:hover {
      transform: scale(1.1);
      background: #fff;
      color: #454545;
    }
    .social-btn.xhs:hover { color: #ff2442; } /* 小红书红 */
    .social-btn.wx:hover { color: #07c160; } /* 微信绿 */
    .leaflet-control-zoom {
      bottom: 80px !important; /* 再抬高一点，给图例留出足够空间 */
      left: 16px !important;
      margin-bottom: 0 !important;
      position: fixed !important;
      top: auto !important;
      right: auto !important;
      border: none !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
      margin: 0 !important;
      z-index: 900 !important; /* 确保在图例之上，但低于弹窗 */
    }
    .leaflet-control-zoom a {
      background: rgba(255, 255, 255, 0.9) !important;
      backdrop-filter: blur(4px);
      color: #454545 !important;
      border-bottom: 1px solid #eee !important;
    }
    .leaflet-control-zoom a:first-child { border-top-left-radius: 8px !important; border-top-right-radius: 8px !important; }
    .leaflet-control-zoom a:last-child { border-bottom-left-radius: 8px !important; border-bottom-right-radius: 8px !important; border-bottom: none !important; }
    
    .legend {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 4px 8px; /* 进一步减小内边距 */
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      border: 1px solid rgba(255, 255, 255, 0.4);
      font-size: 10px; /* 极小字号 */
      color: #666;
      display: flex;
      gap: 8px; /* 减小间距 */
      align-items: center;
      transform: scale(0.9); /* 整体缩放 */
      transform-origin: bottom left;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 0;
    }
    .legend-dot {
      width: 6px; /* 极小圆点 */
      height: 6px;
      border-radius: 50%;
      margin-right: 3px;
      /* 移除边框和阴影，追求极简 */
    }
    .legend-dot.normal { background: #4b7b91; }
    .legend-dot.rare { background: #f8c653; }
    .legend-dot.very-rare { background: #ec6e5f; }

    .corner-logo {
      position: fixed;
      right: 16px;
      bottom: 40px;
      z-index: 1000;
      display: block;
      max-width: 70px;
      max-height: 35px;
      width: auto;
      height: auto;
      opacity: 0.9;
      transition: opacity 0.3s;
    }
    .corner-logo:hover {
      opacity: 1;
    }
    .corner-logo img {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
    }
    .icp-badge {
      position: fixed;
      right: 16px;
      bottom: 24px;
      z-index: 1000;
      font-size: 8px;
      color: #5e3643;
      text-align: right;
    }
    .icp-badge a {
      color: inherit;
      text-decoration: none;
    }
    .custom-marker {
      background: none;
      border: none;
    }
    .marker-pin {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15); /* 更柔和的投影 */
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .marker-pin:hover {
      transform: scale(1.15);
      box-shadow: 0 6px 14px rgba(0,0,0,0.2);
      z-index: 1000;
    }
    .marker-pin img {
      width: 20px;
      height: 20px;
      display: block;
      /* 让图标变成白色，符合扁平化设计 */
      filter: brightness(0) invert(1);
    }
    .popup-content { text-align: center; min-width: 200px; }
    .popup-content img { max-width: 180px; border-radius: 8px; margin-top: 8px; }
    .popup-content h3 { margin-bottom: 8px; color: #454545; font-size: 16px; }
    .popup-content p { color: #666; font-size: 13px; margin-bottom: 4px; }
    .popup-content .uploader-id { font-size: 11px; color: #999; margin-top: 0; margin-bottom: 6px; }

    /* ===== 远山黛 地图底图滤镜 ===== */
    .leaflet-tile-pane {
      /* 降低饱和度，偏灰蓝，呈现水墨远山质感，减少底图颜色对花格图片的干扰 */
      filter: grayscale(0.8) sepia(0.15) hue-rotate(170deg) brightness(1.05) contrast(0.95);
      transition: filter 0.5s ease;
    }

    /* ===== 稀有花格呼吸灯特效 ===== */
    .pulse-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      border-radius: 50%;
      animation: pulsate 2s infinite ease-out;
      z-index: -1;
      pointer-events: none;
    }
    .pulse-rare { background-color: #f8c653; box-shadow: 0 0 12px #f8c653; }
    .pulse-very-rare { background-color: #ec6e5f; box-shadow: 0 0 15px #ec6e5f; }

    @keyframes pulsate {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    }

    /* 覆盖默认的聚合图标样式，使其更符合本站设计 */
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
      background-color: rgba(94, 54, 67, 0.6);
    }
    .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
      background-color: rgba(94, 54, 67, 0.9);
      color: white;
      font-weight: bold;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  
  <div class="glass-bar">
    <a href="/" class="site-logo">
      <img src="/assets/img/top-logo.png" alt="水泥花格地图" onerror="this.style.display='none'">
    </a>
    <div class="stats-badge">
      <span id="workCount">...</span>
      <span id="cityCount" style="margin-left:6px;"></span>
    </div>
    <div class="divider"></div>
    <a href="/pokedex.html" class="upload-btn pokedex-btn" style="background: #fff; color: #5e3643; border: 1px solid #eee; box-shadow: none; margin-right: 4px;">
      <span>📓</span>
      <span>图鉴</span>
    </a>
    <a href="/upload.html" class="upload-btn upload-btn-upload">
      <span>📷</span>
      <span>上传</span>
    </a>
  </div>

  <a class="corner-logo" href="/" aria-label="Powered by 乔尔事务所">
    <img src="/assets/img/corner-logo.png" alt="Powered by 乔尔事务所" loading="lazy" onerror="this.onerror=null;this.src='/logo.svg'">
  </a>
  
  <div class="social-links">
    <a href="https://xhslink.com/m/8FYR2izaPIt" target="_blank" class="social-btn xhs" aria-label="小红书">📕</a>
    <a href="https://mp.weixin.qq.com/s/6sxEyKnz5kDuVZS8HaOpAA" target="_blank" class="social-btn wx" aria-label="公众号">❇️</a>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot normal"></div>
      <span>普通</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot rare"></div>
      <span>稀有</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot very-rare"></div>
      <span>非常稀有</span>
    </div>
  </div>

  <script>
    const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    const API_BASE = isLocal ? 'http://localhost:3000' : '';
    const map = L.map('map', {
      zoomControl: false // 禁用默认位置的缩放控件
    }).setView([35.8617, 104.1954], 5);
    L.control.zoom({ position: 'bottomleft' }).addTo(map);
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
      subdomains: ['1', '2', '3', '4'],
      maxZoom: 18,
      attribution: '© 高德地图'
    }).addTo(map);

    let markers = [];

    const createIcon = (rarity) => {
      let bgColor = '#4b7b91'; // 默认/普通
      let pulseHtml = '';
      if (rarity === '非常稀有') {
        bgColor = '#ec6e5f';
        pulseHtml = `<div class="pulse-ring pulse-very-rare"></div>`;
      } else if (rarity === '稀有') {
        bgColor = '#f8c653';
        pulseHtml = `<div class="pulse-ring pulse-rare"></div>`;
      }
      
      return L.divIcon({
        className: 'custom-marker',
        html: `<div style="position:relative; width:100%; height:100%;">
                ${pulseHtml}
                <div class="marker-pin" style="background-color: ${bgColor};">
                  <img src="/assets/img/window-flower-icon-small.png">
                </div>
               </div>`,
        iconSize: [40, 40],
        iconAnchor: [20, 20],
        popupAnchor: [0, -20]
      });
    };

    async function loadWorks() {
      let works = [];
      try {
        const r = await fetch(`${API_BASE}/api/works`);
        if (r.ok) {
          const result = await r.json();
          works = result.data || result || [];
        } else {
          throw new Error('api failed');
        }
      } catch (_) {
        try {
          const r2 = await fetch('./data/works.json');
          const result2 = await r2.json();
          works = result2.data || result2 || [];
        } catch (e2) {
          console.error('加载作品失败:', e2);
          works = [];
        }
      }
      
      // 如果已存在聚合图层，则先从地图移除
      if (window.markerClusterGroup) {
        map.removeLayer(window.markerClusterGroup);
      }
      
      // 初始化新的聚合图层
      window.markerClusterGroup = L.markerClusterGroup({
        spiderfyOnMaxZoom: true, // 放大到最大时，点击散开（蜘蛛网效果）
        showCoverageOnHover: false, // 隐藏聚合区域的边界范围
        zoomToBoundsOnClick: true,
        maxClusterRadius: 40 // 聚合半径，让分布更紧凑
      });
      
      const useHost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      
      works.forEach(work => {
        if (work.location && work.location.lat && work.location.lng) {
          let lat = parseFloat(work.location.lat);
          let lng = parseFloat(work.location.lng);
          
          const marker = L.marker([lat, lng], {
            icon: createIcon(work.rarity)
          });
          
          let img = work.images && work.images[0] ? work.images[0] : '';
          const popupContent = `
            <div class="popup-content">
              <h3>${work.title || '未命名花格'}</h3>
              <p>📍 ${work.location.address || '未知位置'}</p>
              ${work.userId ? `<p class="uploader-id">👤 发现者：${work.userId}</p>` : ''}
              ${img ? 
                `<img src="${img}" alt="${work.title || ''}" onerror="this.style.display='none'">` : ''}
            </div>
          `;
          
          marker.bindPopup(popupContent);
          window.markerClusterGroup.addLayer(marker);
        }
      });
      
      // 将聚合图层添加到地图
      map.addLayer(window.markerClusterGroup);
      
      const countEl = document.getElementById('workCount');
      const cityEl = document.getElementById('cityCount');
      if (countEl) countEl.textContent = `记录：${works.length}`;
      function parseCity(address) {
        if (!address) return '';
        const s = address.replace(/.*?省/, '');
        const mCity = s.match(/([一-龥]{2,}市)/);
        if (mCity) return mCity[1];
        const municipalities = ['北京','上海','天津','重庆','香港','澳门','台湾'];
        for (const name of municipalities) {
          if (s.includes(name)) return ['香港','澳门','台湾'].includes(name) ? name : name + '市';
        }
        const common = ['深圳','广州','苏州','杭州','南京','武汉','西安','成都','郑州','青岛','厦门','福州','长沙','合肥','宁波','无锡','佛山','大连','沈阳'];
        for (const name of common) {
          if (s.includes(name)) return name + '市';
        }
        return '';
      }
      const cities = new Set();
      works.forEach(w => {
        const addr = (w.location && w.location.address) ? w.location.address : '';
        const city = (w.location && w.location.city) ? w.location.city : parseCity(addr);
        if (city) cities.add(city);
      });
      if (cityEl) cityEl.textContent = `城市：${cities.size}`;
    }

    loadWorks();
    setInterval(loadWorks, 30000);
  </script>
  <div class="icp-badge"><a href="https://beian.miit.gov.cn" target="_blank" rel="noopener noreferrer">粤ICP备2026024114号-1</a></div>
</body>
</html>
