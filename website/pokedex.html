<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花格图鉴 - 水泥花格地图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f5f1e6; 
      min-height: 100vh; 
      color: #333;
    }
    
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245, 241, 230, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(94, 54, 67, 0.1);
    }
    
    .back-link {
      color: #5e3643;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
    }
    
    .page-title { font-size: 18px; font-weight: bold; color: #5e3643; }
    .stats-badge { font-size: 12px; color: #666; }
    
    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
    
    .intro-card {
      padding: 12px 0;
      margin-bottom: 32px;
      text-align: center;
    }
    .intro-card p { 
      color: #888; 
      line-height: 1.6; 
      font-size: 14px; 
      font-style: normal; 
    }

    /* --- 树状图样式核心 --- */
    .family-section { margin-bottom: 50px; }
    .family-header { margin-bottom: 24px; border-left: 4px solid #5e3643; padding-left: 12px; }
    .family-header h3 { color: #5e3643; font-size: 20px; }
    .family-header p { color: #888; font-size: 13px; margin-top: 4px; }

    /* 树形容器 */
    .tree-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-left: 10px;
    }

    /* 每一层级 */
    .tree-level {
      display: flex;
      align-items: flex-start;
      position: relative;
    }
    .family-section .tree-level.root { margin-bottom: 14px; }
    .family-section .tree-level.root { margin-bottom: 22px; }

    /* 连接线系统 */
    .tree-connector {
      width: 30px;
      height: 60px; /* 连接线高度 */
      border-left: 2px solid #ccc;
      border-bottom: 2px solid #ccc;
      margin-right: 10px;
      margin-top: -30px; /* 向上延伸对接上一层 */
      border-bottom-left-radius: 12px;
      flex-shrink: 0;
    }
    
    /* 根节点不需要左侧连接线 */
    .tree-level.root .tree-connector { display: none; }
    
    /* 节点卡片 */
    .node-card {
      background: #fff;
      border: 1px solid rgba(94, 54, 67, 0.15);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      position: relative;
      transition: all 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    
    .node-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(94, 54, 67, 0.1);
      border-color: #5e3643;
    }

    .pixel-icon {
      width: 48px;
      height: 48px;
      background: #5e3643;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      image-rendering: pixelated;
      border: 1px solid #5e3643;
    }
    .pixel-icon img { width: 32px; height: 32px; opacity: 0.9; }
    
    .node-info { flex: 1; }
    .node-name { font-weight: bold; font-size: 15px; color: #333; }
    .node-tags { display: flex; gap: 6px; margin-top: 4px; }
    .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #eee; color: #666; }
    .tag.origin { background: #eee; color: #666; }
    .tag.variant { background: #eee; color: #666; }
    .tag.material { background: #eee; color: #666; }

    /* 可折叠/展开的交互样式 */
    .node-card.has-children {
      cursor: pointer;
      padding-right: 32px; /* 给折叠图标留位 */
    }
    
    .node-card.has-children::after {
      content: '+';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      background: #eee;
      border-radius: 50%;
      text-align: center;
      line-height: 20px;
      color: #666;
      font-weight: bold;
      font-family: monospace;
      transition: all 0.2s;
    }
    
    /* 展开状态 */
    .node-card.has-children.expanded {
      background-color: #fff8f0;
      border-color: #5e3643;
    }
    
    .node-card.has-children.expanded::after {
      content: '-';
      background: #5e3643;
      color: #fff;
    }

    /* 默认隐藏子节点容器 */
    .children-container {
      display: none;
      flex-direction: column;
      gap: 16px;
      margin-left: 24px;
      margin-top: 16px;
      margin-bottom: 0;
      position: relative;
      /* 简单的展开动画 */
      animation: slideDown 0.3s ease-out;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* 激活显示 */
    .children-container.show {
      display: flex;
      margin-bottom: 14px; /* 展开时与下一个根节点保持 14px 间距 */
    }
    
    /* 垂直贯穿线 */
    .children-container::before {
      content: '';
      position: absolute;
      left: 0;
      top: -10px;
      bottom: 20px; /* 不到底，留出最后一个弯 */
      width: 2px;
      background: #ccc;
    }

    /* 待解锁 */
    .node-card.locked { opacity: 0.6; filter: grayscale(1); border-style: dashed; }
    
    .upload-cta {
      margin-top: 40px;
      text-align: center;
      padding: 30px;
      background: linear-gradient(145deg, #653a48, #552f3a);
      border-radius: 16px;
      color: #fff;
    }
    .cta-btn {
      background: #fff;
      color: #5e3643;
      padding: 10px 24px;
      border-radius: 100px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      display: inline-block;
      margin-top: 16px;
    }
    .icp-badge {
      position: fixed;
      right: 16px;
      bottom: 8px;
      z-index: 1000;
      font-size: 8px;
      color: #5e3643;
      text-align: right;
    }
    .icp-badge a {
      color: inherit;
      text-decoration: none;
    }

  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="/" class="back-link">← 返回地图</a>
    <div class="page-title">花格谱系</div>
    <div class="stats-badge"><span id="pk-workCount">...</span><span id="pk-cityCount" style="margin-left:6px;"></span></div>
  </nav>

  <div class="container">
    <div class="intro-card">
      <p>从基础原型到复杂变体，这里记录了城市中发现的所有花格类型。</p>
    </div>

    <div id="pokedex-container">
      <div style="text-align: center; color: #999; padding: 40px;">正在加载图鉴数据...</div>
    </div>
    
    <div class="upload-cta">
      <h3>发现新物种？</h3>
      <p>如果你发现了图鉴中没有的花格，请拍照上传！<br>我们将绘制专属的像素图标。</p>
      <a href="/upload.html" class="cta-btn">去上传</a>
    </div>

  </div>

  <script>
    async function loadPokedex() {
      const container = document.getElementById('pokedex-container');
      try {
        // 1. Load config first
        let config = { types: [], categories: [] };
        try {
          const cfgRes = await fetch('/api/pokedex/config');
          if (cfgRes.ok) {
            const json = await cfgRes.json();
            config = json.data;
          }
        } catch (e) { console.warn('Config load failed', e); }
        
        // 2. Load data
        const res = await fetch('/api/pokedex');
        if (!res.ok) throw new Error('Failed to load');
        const json = await res.json();
        const data = json.data || [];
        
        if (data.length === 0) {
          container.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">暂无图鉴数据</div>';
          return;
        }

        // Group by type based on config
        const typeMap = {};
        // Initialize from config
        config.types.forEach(t => {
          typeMap[t.key] = { ...t, items: [] };
        });
        // Ensure 'other' exists
        if (!typeMap['other']) {
           typeMap['other'] = { key: 'other', label: '❓ 其他纹系', description: '尚未分类的未知纹样', items: [] };
        }

        data.forEach(item => {
          const t = item.type || 'other';
          if (typeMap[t]) {
            typeMap[t].items.push(item);
          } else {
            typeMap['other'].items.push(item);
          }
        });

        let html = '';

        // Iterate based on config order
        const sortedKeys = [...config.types.map(t => t.key)];
        if (!sortedKeys.includes('other')) sortedKeys.push('other');

        for (const key of sortedKeys) {
          const group = typeMap[key];
          if (!group) continue;
          
          if (group.items.length === 0 && key !== 'other') continue; 
          if (group.items.length === 0 && key === 'other') continue;

          // Build tree for this group
          const roots = group.items.filter(i => !i.parentId);
          const childrenMap = {};
          group.items.forEach(i => {
            if (i.parentId) {
              if (!childrenMap[i.parentId]) childrenMap[i.parentId] = [];
              childrenMap[i.parentId].push(i);
            }
          });

          let groupHtml = `
            <div class="family-section">
              <div class="family-header">
                <h3>${group.label}</h3>
                <p>${group.description}</p>
              </div>
          `;

          // If no roots but items exist (orphans), treat as roots
          if (roots.length === 0 && group.items.length > 0) {
             // fallback
             group.items.forEach(item => roots.push(item));
          }

          roots.forEach(root => {
            const children = childrenMap[root.id] || [];
            const hasChildren = children.length > 0; // or always show "???" placeholder if we want

            groupHtml += `
              <div class="tree-level root">
                <div class="node-card ${hasChildren ? 'has-children' : ''}">
                  <div class="pixel-icon">
                    <img src="${root.icon || ''}" alt="${root.name}" onerror="this.style.display='none'">
                  </div>
                  <div class="node-info">
                    <div class="node-name">${root.name}</div>
                    <div class="node-tags">
                      <span class="tag ${root.category === '原型' ? 'origin' : 'variant'}">${root.category || '未分类'}</span>
                      <span class="tag">No.${root.id}</span>
                    </div>
                  </div>
                </div>
              </div>
            `;

            if (true) { // Always render children container for potential "???" or actual children
               groupHtml += `<div class="children-container">`;
               
               children.forEach(child => {
                 groupHtml += `
                  <div class="tree-level">
                    <div class="tree-connector"></div>
                    <div class="node-card">
                      <div class="pixel-icon" style="background: #f0f8ff;">
                        <img src="${child.icon || ''}" alt="${child.name}" onerror="this.style.display='none'">
                      </div>
                      <div class="node-info">
                        <div class="node-name">${child.name}</div>
                        <div class="node-tags">
                          <span class="tag ${child.category === '原型' ? 'origin' : 'variant'}">${child.category || '结构'}</span>
                          <span class="tag">No.${child.id}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                 `;
               });

               // Placeholder for unknown variant
               groupHtml += `
                  <div class="tree-level">
                    <div class="tree-connector"></div>
                    <div class="node-card locked">
                      <div class="pixel-icon">❓</div>
                      <div class="node-info">
                        <div class="node-name">???</div>
                        <div class="node-tags"><span class="tag">未发现</span></div>
                      </div>
                    </div>
                  </div>
               `;
               
               groupHtml += `</div>`;
            }
          });

          groupHtml += `</div>`;
          html += groupHtml;
        }

        container.innerHTML = html;
        
        // Re-attach event listeners
        document.querySelectorAll('.node-card.has-children').forEach(card => {
          card.addEventListener('click', function(e) {
            this.classList.toggle('expanded');
            let container = null;
            if (this.parentElement.classList.contains('root')) {
              container = this.parentElement.nextElementSibling;
            } else {
              container = this.parentElement.nextElementSibling;
            }
            if (container && container.classList.contains('children-container')) {
              container.classList.toggle('show');
            }
          });
        });

      } catch (e) {
        console.error(e);
        container.innerHTML = '<div style="text-align: center; color: red;">加载失败</div>';
      }
    }

    loadPokedex();
    async function loadCounts() {
      let works = [];
      try {
        const r = await fetch('/api/works');
        if (r.ok) {
          const result = await r.json();
          works = result.data || result || [];
        } else {
          const r2 = await fetch('./data/works.json');
          const result2 = await r2.json();
          works = result2.data || result2 || [];
        }
      } catch (_) {
        try {
          const r2 = await fetch('./data/works.json');
          const result2 = await r2.json();
          works = result2.data || result2 || [];
        } catch (e2) {
          works = [];
        }
      }
      const countEl = document.getElementById('pk-workCount');
      const cityEl = document.getElementById('pk-cityCount');
      if (countEl) countEl.textContent = `记录：${works.length}`;
      function parseCity(address) {
        if (!address) return '';
        const s = address.replace(/.*?省/, '');
        const mCity = s.match(/([一-龥]{2,}市)/);
        if (mCity) return mCity[1];
        const municipalities = ['北京','上海','天津','重庆','香港','澳门','台湾'];
        for (const name of municipalities) {
          if (s.includes(name)) return ['香港','澳门','台湾'].includes(name) ? name : name + '市';
        }
        const common = ['深圳','广州','苏州','杭州','南京','武汉','西安','成都','郑州','青岛','厦门','福州','长沙','合肥','宁波','无锡','佛山','大连','沈阳'];
        for (const name of common) {
          if (s.includes(name)) return name + '市';
        }
        return '';
      }
      const cities = new Set();
      works.forEach(w => {
        const addr = (w.location && w.location.address) ? w.location.address : '';
        const city = (w.location && w.location.city) ? w.location.city : parseCity(addr);
        if (city) cities.add(city);
      });
      if (cityEl) cityEl.textContent = `城市：${cities.size}`;
    }
    loadCounts();
  </script>
  <div class="icp-badge"><a href="https://beian.miit.gov.cn" target="_blank" rel="noopener noreferrer">粤ICP备2026024114号-1</a></div>

</body>
