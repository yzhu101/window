<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花格图鉴 - 水泥花格地图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f5f1e6; 
      min-height: 100vh; 
      color: #333;
    }
    
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245, 241, 230, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(94, 54, 67, 0.1);
    }
    
    .back-link {
      color: #5e3643;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
    }
    
    .page-title { font-size: 18px; font-weight: bold; color: #5e3643; }
    .stats-badge { font-size: 12px; color: #666; }
    
    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
    
    .intro-card {
      padding: 12px 0;
      margin-bottom: 32px;
      text-align: center;
    }
    .intro-card p { 
      color: #888; 
      line-height: 1.6; 
      font-size: 14px; 
      font-style: normal; 
    }

    /* --- 树状图样式核心 --- */

    /* --- 新版横向滚动布局 --- */
    .family-section {
      margin-bottom: 50px;
    }
    
    .scroll-container {
      display: flex;
      flex-direction: row;
      gap: 32px;
      overflow-x: auto;
      padding-bottom: 24px;
      align-items: flex-start;
      /* 隐藏滚动条 */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .scroll-container::-webkit-scrollbar {
      display: none;
    }
    
    .tile-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* 调整连接线：隐藏原有的树状连接线 */
    .tree-connector {
      display: none;
    }
    
    .children-container {
      display: none;
      flex-direction: column;
      gap: 16px;
      margin-top: 16px;
      margin-left: 0;
      position: relative;
      animation: slideDown 0.3s ease-out;
      align-items: center;
    }
    
    /* 让子卡片整体向右偏移一点点，与树干拉开距离 */
    .children-container .tree-level {
      transform: translateX(24px);
    }
    
    /* 垂直贯穿线居中，因为子卡片右移了，线和卡片就会拉开距离 */
    .children-container::before {
      content: '';
      position: absolute;
      left: 50%;
      top: -16px;
      bottom: 20px; /* 底部留一点空隙，不穿透最后一张卡片 */
      width: 2px;
      background: rgba(94, 54, 67, 0.2);
      transform: translateX(-50%);
      z-index: -1;
    }
    
    /* 为了显示，覆盖原来的 .children-container.show */
    .children-container.show {
      display: flex !important;
      margin-bottom: 0;
    }

    .family-section { margin-bottom: 50px; }
    .family-header { margin-bottom: 24px; border-left: 4px solid #5e3643; padding-left: 12px; }
    .family-header h3 { color: #5e3643; font-size: 20px; }
    .family-header p { color: #888; font-size: 13px; margin-top: 4px; }

    /* 树形容器 */
    .tree-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-left: 10px;
    }

    /* 每一层级 */
    .tree-level {
      display: flex;
      align-items: flex-start;
      position: relative;
    }
    .family-section .tree-level.root { margin-bottom: 14px; }
    .family-section .tree-level.root { margin-bottom: 22px; }

    /* 连接线系统 */
    .tree-connector {
      width: 30px;
      height: 76px; /* 连接线高度 */
      border-left: 2px solid #ccc;
      border-bottom: 2px solid #ccc;
      margin-right: 10px;
      margin-top: -30px; /* 向上延伸对接上一层 */
      border-bottom-left-radius: 12px;
      flex-shrink: 0;
    }
    
    /* 根节点不需要左侧连接线 */
    .tree-level.root .tree-connector { display: none; }
    
    /* 节点卡片 */
    .tile-card {
      width: 160px; min-width: 160px;
      height: 160px;
      background: #F4F0E8;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      padding: 16px 16px 20px 16px;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: all 0.2s;
      box-shadow: 0 6px 14px rgba(0,0,0,0.06);
    }
    
    .tile-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      border-color: #5e3643;
    }

    .tile-icon {
      width: 60px;
      height: 60px;
      background: #5e3643;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }
    .tile-icon img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
      opacity: 0.9; 
    }
    
    .tile-top-right {
      position: absolute;
      top: 16px;
      right: 12px;
      color: #767676;
      font-size: 10px;
      font-weight: 500;
      /* Add left-padding so it never touches the icon */
      width: calc(100% - 90px);
      text-align: right;
    }

    .tile-name { 
      color: #2F2F2F;
      font-size: 14px;
      font-weight: 600;
      margin-top: 12px;
    }
    
    .tile-tag { 
      color: #9A9A9A;
      font-size: 10px;
      margin-top: 2px;
    }

    /* 可折叠/展开的交互样式 */
    .tile-card.has-children {
      cursor: pointer;
    }
    
    .tile-card.has-children::after {
      content: '+';
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 24px;
      height: 24px;
      background: #eee;
      border-radius: 50%;
      text-align: center;
      line-height: 24px;
      color: #666;
      font-weight: bold;
      font-family: monospace;
      transition: all 0.2s;
    }
    
    /* 展开状态 */
    .tile-card.has-children.expanded {
      background-color: #fff8f0;
      border-color: #5e3643;
    }
    
    .tile-card.has-children.expanded::after {
      content: '-';
      background: #5e3643;
      color: #fff;
    }

    /* 默认隐藏子节点容器 */
    .children-container {
      display: none;
      flex-direction: column;
      gap: 16px;
      margin-left: 24px;
      margin-top: 16px;
      margin-bottom: 0;
      position: relative;
      /* 简单的展开动画 */
      animation: slideDown 0.3s ease-out;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* 激活显示 */
    
    
    /* 垂直贯穿线 */
    .children-container::before {
      content: '';
      position: absolute;
      left: 0;
      top: -10px;
      bottom: 20px; /* 不到底，留出最后一个弯 */
      width: 2px;
      background: #ccc;
    }

    /* 待解锁 */
    .tile-card.locked { opacity: 0.6; filter: grayscale(1); border-style: dashed; }
    
    .upload-cta {
      margin-top: 40px;
      text-align: center;
      padding: 30px;
      background: linear-gradient(145deg, #653a48, #552f3a);
      border-radius: 16px;
      color: #fff;
    }
    .cta-btn {
      background: #fff;
      color: #5e3643;
      padding: 10px 24px;
      border-radius: 100px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      display: inline-block;
      margin-top: 16px;
    }
    .icp-badge {
      position: fixed;
      right: 16px;
      bottom: 8px;
      z-index: 1000;
      font-size: 8px;
      color: #5e3643;
      text-align: right;
    }
    .icp-badge a {
      color: inherit;
      text-decoration: none;
    }

  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="/" class="back-link">← 返回地图</a>
    <div class="page-title">花格谱系</div>
    <div class="stats-badge"><span id="pk-workCount">...</span><span id="pk-cityCount" style="margin-left:6px;"></span></div>
  </nav>

  <div class="container">
    <div class="intro-card">
      <p>从基础原型到复杂变体，这里记录了城市中发现的所有花格类型。</p>
    </div>

    <!-- 谱系 1: 鸟类系 -->
    <div id="pokedex-container"></div>
    <div class="upload-cta">
      <h3>发现新物种？</h3>
      <p>如果你发现了图鉴中没有的花格，请拍照上传！<br>我们将绘制专属的像素图标。</p>
      <a href="/upload.html" class="cta-btn">去上传</a>
    </div>

  </div>

  <script>

    async function loadCounts() {
      let works = [];
      try {
        const r = await fetch('/api/works');
        if (r.ok) {
          const result = await r.json();
          works = result.data || result || [];
        } else {
          const r2 = await fetch('./data/works.json');
          const result2 = await r2.json();
          works = result2.data || result2 || [];
        }
      } catch (_) {
        try {
          const r2 = await fetch('./data/works.json');
          const result2 = await r2.json();
          works = result2.data || result2 || [];
        } catch (e2) {
          works = [];
        }
      }
      const countEl = document.getElementById('pk-workCount');
      const cityEl = document.getElementById('pk-cityCount');
      if (countEl) countEl.textContent = `记录：${works.length}`;
      function parseCity(address) {
        if (!address) return '';
        const s = address.replace(/.*?省/, '');
        const mCity = s.match(/([一-龥]{2,}市)/);
        if (mCity) return mCity[1];
        const municipalities = ['北京','上海','天津','重庆','香港','澳门','台湾'];
        for (const name of municipalities) {
          if (s.includes(name)) return ['香港','澳门','台湾'].includes(name) ? name : name + '市';
        }
        const common = ['深圳','广州','苏州','杭州','南京','武汉','西安','成都','郑州','青岛','厦门','福州','长沙','合肥','宁波','无锡','佛山','大连','沈阳'];
        for (const name of common) {
          if (s.includes(name)) return name + '市';
        }
        return '';
      }
      const cities = new Set();
      works.forEach(w => {
        const addr = (w.location && w.location.address) ? w.location.address : '';
        const city = (w.location && w.location.city) ? w.location.city : parseCity(addr);
        if (city) cities.add(city);
      });
      if (cityEl) cityEl.textContent = `城市：${cities.size}`;
    }
    loadCounts();

    const API_BASE = window.API_BASE || '';
    
    async function loadPokedex() {
      try {
        // Fetch config
        const confRes = await fetch(`${API_BASE}/api/pokedex/config`);
        let config = { types: [] };
        if (confRes.ok) {
            const confJson = await confRes.json();
            config = confJson.data || { types: [] };
        } else {
            // fallback config
            config = { types: [
                { key: 'bird', label: '🪽 鸟类纹系', description: '线条如同飞翔的海鸥，也像波浪，是最具代表性的花格类型。' },
                { key: 'geometric', label: '💠 几何纹系', description: '由基础几何图形构成的严谨图案。' },
                { key: 'flower', label: '🌷 花草纹系', description: '以花瓣、枝叶与藤蔓为母题的柔和纹样。' }
            ]};
        }
        
        // Fetch items
        let items = [];
        const res = await fetch(`${API_BASE}/api/pokedex`);
        if (res.ok) {
            const json = await res.json();
            items = json.data || [];
        } else {
            const res2 = await fetch('./data/pokedex.json');
            items = await res2.json();
        }
        
        // Build map: parentId -> children
        const childrenMap = {};
        const roots = [];
        
        items.forEach(item => {
          if (item.parentId) {
            if (!childrenMap[item.parentId]) childrenMap[item.parentId] = [];
            childrenMap[item.parentId].push(item);
          } else {
            roots.push(item);
          }
        });
        
        // Group roots by type
        const groups = {};
        config.types.forEach(t => {
          groups[t.key] = { label: t.label, description: t.description || '', items: [] };
        });
        groups['other'] = { label: '❓ ???纹系', description: '尚未分类的未知纹样，待后续补充。', items: [] };
        
        roots.forEach(root => {
          if (groups[root.type]) {
            groups[root.type].items.push(root);
          } else {
            groups['other'].items.push(root);
          }
        });
        
        

        function mapCategory(cat) {
            if (!cat) return '';
            if (cat.includes('基础') || cat === '原型') return '原型';
            if (cat.includes('衍生') || cat === '结构') return '结构';
            return cat;
        }

        let html = '';
        
        for (const typeKey of [...config.types.map(t=>t.key), 'other']) {
          const group = groups[typeKey];
          if (!group || (group.items.length === 0 && typeKey === 'other')) continue;
          
          let groupHtml = `
            <div class="family-section">
              <div class="family-header">
                <h3>${group.label}</h3>
                <p>${group.description}</p>
              </div>
              <div class="scroll-container">
          `;
          
          if (group.items.length === 0) {
            // Render a locked placeholder
            groupHtml += `
              <div class="tile-wrapper">
                <div class="tree-level root">
                  <div class="tile-card locked">
                    <div class="tile-icon">❓</div>
                    <div class="tile-top-right">???</div>
                    <div class="tile-name">???</div>
                    <div class="tile-tag">未发现</div>
                  </div>
                </div>
              </div>
            `;
          } else {
            // Sort roots by sortOrder
            group.items.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
            group.items.forEach(root => {
              const children = childrenMap[root.id] || [];
              children.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
              const hasChildren = children.length > 0;
              
              groupHtml += `
                <div class="tile-wrapper">
                  <div class="tree-level root">
                    <div class="tile-card ${hasChildren ? 'has-children' : ''}">
                      <div class="tile-icon" style="background: #5e3643;">
                        <img src="${root.icon || ''}" alt="${root.name}" onerror="this.style.display='none'">
                      </div>
                      <div class="tile-top-right">No.${root.id}</div>
                      <div class="tile-name">${root.name}</div>
                      <div class="tile-tag">${mapCategory(root.category) || '未分类'}</div>
                      
                    </div>
                  </div>
              `;
              
              if (hasChildren) {
                groupHtml += `<div class="children-container">`;
                children.forEach(child => {
                  groupHtml += `
                    <div class="tree-level">
                      <div class="tree-connector"></div>
                      <div class="tile-card">
                        <div class="tile-icon" style="background: #5e3643;">
                          <img src="${child.icon || ''}" alt="${child.name}" onerror="this.style.display='none'">
                        </div>
                        <div class="tile-top-right">No.${child.id}</div>
                        <div class="tile-name">${child.name}</div>
                        <div class="tile-tag">${mapCategory(child.category) || '结构'}</div>
                        
                      </div>
                    </div>
                  `;
                });
                
                // Optional locked child
                groupHtml += `
                  <div class="tree-level">
                    <div class="tree-connector"></div>
                    <div class="tile-card locked">
                      <div class="tile-icon">❓</div>
                      <div class="tile-top-right">???</div>
                      <div class="tile-name">???</div>
                      <div class="tile-tag">未发现</div>
                    </div>
                  </div>
                `;
                
                groupHtml += `</div>`; // End children-container
              }
              
              groupHtml += `</div>`; // End tile-wrapper
            });
          }
          
          groupHtml += `</div></div>`; // End scroll-container & family-section
          html += groupHtml;
        }
        
        document.getElementById('pokedex-container').innerHTML = html;
        
        // Re-bind click events
        document.querySelectorAll('.tile-card.has-children').forEach(card => {
          card.addEventListener('click', function(e) {
            // Ignore if map-btn is clicked
            if (e.target.classList.contains('map-btn') || e.target.closest('.map-btn')) return;
            
            this.classList.toggle('expanded');
            let wrapper = this.closest('.tile-wrapper');
            let container = wrapper ? wrapper.querySelector('.children-container') : null;
            if (container) {
              container.classList.toggle('show');
            }
          });
        });
        
        // Bind Map BTN logic (if there is map logic)
        
      } catch (e) {
        console.error('加载图鉴失败', e);
      }
    }

    loadPokedex();
  </script>
  <div class="icp-badge"><a href="https://beian.miit.gov.cn" target="_blank" rel="noopener noreferrer">粤ICP备2026024114号-1</a></div>

</div>
</div>

</body>
