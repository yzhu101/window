<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 水泥花格地图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      margin: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    .error {
      color: #e74c3c;
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🔐 管理后台登录</h1>
    <form id="loginForm">
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入管理密码" required>
      </div>
      <button type="submit">登录</button>
      <div class="error" id="error"></div>
    </form>
    <a href="/" class="back-link">← 返回地图</a>
  </div>

  <script>
    // 设置你的管理密码（建议修改成你自己的密码）
    const ADMIN_PASSWORD = 'Zyn87752007';
    
    document.getElementById('loginForm').onsubmit = function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      
      if (password === ADMIN_PASSWORD) {
        // 登录成功，设置 cookie（24小时有效）
        document.cookie = 'admin_token=huage_admin_2024; path=/; max-age=86400';
        // 跳转到管理后台
        window.location.href = '/admin.html';
      } else {
        document.getElementById('error').textContent = '密码错误，请重试';
      }
    };
  </script>
</body>
</html>
